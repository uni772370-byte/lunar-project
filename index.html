<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>LUNAR TUTSUKI</title>
<script src="https://cdn.jsdelivr.net/npm/clappr"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
      --ciano-neon: #00ffff;
      --ciano-escuro: #00cccc;
      --azul-brilhante: #0099ff;
      --azul-escuro: #0066cc;
      --roxo-neon: #9945ff;
      --fundo-matrix: #0a0a0a;
      --fundo-secundario: #111111;
      --fundo-terciario: #1a1a1a;
      --borda-neon: rgba(0, 255, 255, 0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--fundo-matrix);
      color: var(--ciano-neon);
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
      font-size: 18px; /* Fonte base aumentada */
    }
    
    /* Fundo com padrão de grade */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: -2;
    }
    
    /* Efeito de gradiente sutil no fundo */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 255, 255, 0.02) 0%, transparent 70%);
      z-index: -1;
    }
    
    /* Container principal */
    .main-container {
      max-width: 1400px; /* Aumentado para acomodar fontes maiores */
      margin: 0 auto;
      padding: 30px;
      position: relative;
      z-index: 1;
    }
    
    /* Cabeçalho minimalista */
    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--borda-neon);
      border-radius: 15px;
    }
    
    .header h1 {
      font-size: 42px; /* Aumentado de 28px */
      font-weight: bold;
      color: var(--ciano-neon);
      text-shadow: 0 0 15px var(--ciano-neon);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    
    .header .subtitle {
      font-size: 20px; /* Aumentado de 14px */
      color: var(--ciano-escuro);
      margin-top: 10px;
      opacity: 0.8;
    }
    
    /* Container do formulário */
    .form-container {
      background: rgba(10, 10, 10, 0.7);
      border: 1px solid var(--borda-neon);
      border-radius: 15px;
      padding: 35px;
      margin-bottom: 35px;
      position: relative;
    }
    
    .form-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ciano-neon), transparent);
      animation: topBorder 4s infinite;
    }
    
    @keyframes topBorder {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    /* Campos de entrada */
    .input-row {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .input-group {
      flex: 1;
      min-width: 280px; /* Aumentado */
    }
    
    .input-group label {
      display: block;
      margin-bottom: 12px;
      font-size: 18px; /* Aumentado de 14px */
      color: var(--ciano-escuro);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }
    
    input, select {
      width: 100%;
      padding: 18px 20px; /* Aumentado */
      font-size: 20px; /* Aumentado de 16px */
      background: rgba(0, 0, 0, 0.5);
      color: var(--ciano-neon);
      border: 1px solid var(--borda-neon);
      border-radius: 8px; /* Aumentado */
      transition: all 0.3s ease;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: var(--ciano-neon);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.7);
    }
    
    /* Botões organizados em linha - TODOS COM A MESMA COR */
    .button-row {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    button {
      padding: 18px 25px; /* Aumentado */
      font-size: 18px; /* Aumentado de 14px */
      font-weight: bold;
      background: rgba(0, 0, 0, 0.6);
      color: var(--ciano-neon);
      border: 1px solid var(--borda-neon);
      border-radius: 8px; /* Aumentado */
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px; /* Aumentado */
    }
    
    button:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: var(--ciano-neon);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    /* TODOS OS BOTÕES COM A MESMA COR PADRÃO DO SISTEMA */
    button {
      border-color: var(--ciano-neon);
      color: var(--ciano-neon);
    }
    
    button:hover {
      background: rgba(0, 255, 255, 0.2);
      border-color: var(--ciano-neon);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
    }
    
    button.active {
      background: rgba(0, 255, 255, 0.2);
      border-color: var(--ciano-neon);
      color: var(--ciano-neon);
    }
    
    /* Container de resultados */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 35px;
    }
    
    @media (max-width: 968px) {
      .results-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .result-box {
      background: rgba(10, 10, 10, 0.7);
      border: 1px solid var(--borda-neon);
      border-radius: 15px;
      padding: 25px;
      position: relative;
    }
    
    .result-box::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ciano-neon), transparent);
      animation: topBorder 4s infinite;
    }
    
    .result-title {
      font-size: 22px; /* Aumentado de 16px */
      margin-bottom: 20px;
      color: var(--ciano-neon);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
    }
    
    #progresso, #resultados {
      font-family: 'Courier New', monospace;
      color: var(--ciano-neon);
      font-size: 18px; /* Aumentado de 14px */
      max-height: 200px; /* Aumentado */
      overflow-y: auto;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      line-height: 1.6; /* Melhor espaçamento */
    }
    
    /* Scrollbar personalizada */
    #progresso::-webkit-scrollbar, 
    #resultados::-webkit-scrollbar, 
    #hitsBox::-webkit-scrollbar {
      width: 10px; /* Aumentado */
    }
    
    #progresso::-webkit-scrollbar-track, 
    #resultados::-webkit-scrollbar-track, 
    #hitsBox::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 5px;
    }
    
    #progresso::-webkit-scrollbar-thumb, 
    #resultados::-webkit-scrollbar-thumb, 
    #hitsBox::-webkit-scrollbar-thumb {
      background: var(--ciano-neon);
      border-radius: 5px;
    }
    
    /* Container de hits */
    .hits-container {
      background: rgba(10, 10, 10, 0.7);
      border: 1px solid var(--borda-neon);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 35px;
      position: relative;

    .hits-container::before {

      top: 0;
      left: 0;

      height: 2px;

      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .hits-title {
      font-size: 24px; /* Aumentado de 18px */
      color: var(--ciano-neon);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;

    .hit-count {
      font-size: 32px; /* Aumentado de 24px */
      font-weight: bold;
      color: var(--ciano-neon);
      padding: 10px 20px; /* Aumentado */
      border: 1px solid var(--borda-neon);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
    }
    
    #hitsBox {
      font-family: 'Courier New', monospace;
      color: var(--ciano-neon);
      font-size: 16px; /* Aumentado de 12px */
      max-height: 300px; /* Aumentado */
      overflow-y: auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      white-space: pre-wrap;
      line-height: 1.5; /* Melhor legibilidade */
    }
    
    /* Painel de estatísticas */
    .stats-container {
      background: rgba(10, 10, 10, 0.7);
      border: 1px solid var(--borda-neon);
      border-radius: 15px;
      padding: 25px;
      position: relative;
    }
    
    .stats-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ciano-neon), transparent);
      animation: topBorder 4s infinite;
    }
    
    .stats-title {
      font-size: 24px; /* Aumentado de 18px */
      margin-bottom: 20px;
      color: var(--ciano-neon);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      font-weight: bold;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    
    .stat-item {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .stat-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.1);
    }
    
    .stat-label {
      font-size: 16px; /* Aumentado de 12px */
      color: var(--ciano-escuro);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }
    
    .stat-value {
      font-size: 26px; /* Aumentado de 20px */
      font-weight: bold;
      color: var(--ciano-neon);
    }
    
    /* Barra de progresso */
    .progress-bar-container {
      width: 100%;
      height: 12px; /* Aumentado */
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 6px;
      overflow: hidden;
      margin: 15px 0;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--azul-escuro), var(--ciano-neon));
      width: 0%;
      transition: width 0.3s ease;
    }
    
    /* Notificações */
    .notification {
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 18px; /* Aumentado */
      text-align: center;
      font-weight: bold;
    }
    
    .notification.success {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid var(--ciano-neon);
      color: var(--ciano-neon);
    }
    
    .notification.error {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff4444;
      color: #ff4444;
    }
    
    /* Efeito Matrix Rain sutil */
    #matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.1;
    }
    
    /* Ícones maiores */
    .fas {
      font-size: 20px;
    }
    
    .result-title .fas,
    .hits-title .fas,
    .stats-title .fas {
      font-size: 24px;
    }
</style>
</head>

<script>
    // Efeito Matrix Rain sutil com cores ciano
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letras = "01".split("");
    const fontSize = 12; /* Aumentado */
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrixRain() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00ffff";
      ctx.font = fontSize + "px Courier";

      for (let i = 0; i < drops.length; i++) {
        const text = letras[Math.floor(Math.random() * letras.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(drawMatrixRain, 100);
    
    // Variáveis globais
    let hitsColetados = [];
    let hitCount = 0;
    let scanParado = false;
    const nick = "👹 João apk ";
    let conexaoCount = 0;
    let conexaoMaximaCount = 0;
    let aleatorioLigado = false;
    let turboAtivo = false;

    // Funções de controle
    function alternarModoAleatorio(btn) {
      aleatorioLigado = !aleatorioLigado;
      btn.textContent = aleatorioLigado ? "🎲 ALEATÓRIO: LIGADO" : "🎯 ALEATÓRIO: DESLIGADO";
      btn.classList.toggle("active", aleatorioLigado);
    }

    function alternarModoTurbo(btn) {
      turboAtivo = !turboAtivo;
      btn.textContent = turboAtivo ? "⚡ TURBO: LIGADO" : "⚡ TURBO: DESLIGADO";
      btn.classList.toggle("active", turboAtivo);
      if (turboAtivo) {
        alert("⚡ Modo Hack Turbo ativado! Requisições simultâneas iniciadas.");
      }
    }

    function tocarSomHit() {
      const audio = new Audio('https://dl.dropboxusercontent.com/scl/fi/waz3ca1dzyha09z6jpk2w/Tiro.mp3?rlkey=z48seybu6n90aorrsscwd4met&st=5wy50ht7&?raw=1');
      audio.play().catch(err => console.error("Erro ao tocar som:", err));
    }

    function formatarData(timestamp) {
      if (!timestamp) return "Desconhecido";
      const d = new Date(timestamp * 1000);
      return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }

    function diasRestantes(timestamp) {
      if (!timestamp) return "?";
      const d = new Date(timestamp * 1000);
      const hoje = new Date();
      const dias = Math.floor((d - hoje) / (1000 * 60 * 60 * 24));
      return dias >= 0 ? dias : 0;
    }

    async function obterConexoesAtivas(painel, user, pass) {
      try {
        const res = await fetch(`${painel}/player_api.php?username=${user}&password=${pass}&action=get_user_info`);
        const data = await res.json();
        conexaoCount = data.user_info.connections || 0;
        conexaoMaximaCount = data.user_info.max_connections || 1;
      } catch (err) {
        console.error("Erro ao obter conexões:", err);
      }
    }

    async function verificarConteudo(painel, user, pass) {
      const canais = await fetch(`${painel}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`).then(r => r.json());
      const filmes = await fetch(`${painel}/player_api.php?username=${user}&password=${pass}&action=get_vod_streams`).then(r => r.json());
      const series = await fetch(`${painel}/player_api.php?username=${user}&password=${pass}&action=get_series`).then(r => r.json());
      const canalAdulto = canais.some(canal => canal.isAdult);
      return { canais, filmes, series, canalAdulto };
    }

    async function scan() {
      scanParado = false;
      const servidorInput = document.getElementById("servidor").value.trim();
      const servidor = servidorInput.startsWith("http") ? servidorInput.replace(/\/$/, "") : `http://${servidorInput.replace(/\/$/, "")}`;

    function salvarArquivo() {
      const hits = document.getElementById("hitsBox").textContent;
      const servidor = document.getElementById("servidor").value.trim();
      const dataAtual = new Date();
      const dataFormatada = `${dataAtual.getDate().toString().padStart(2, '0')}-${(dataAtual.getMonth()+1).toString().padStart(2, '0')}-${dataAtual.getFullYear()}`;
      const nomeArquivo = `${servidor.replace(/https?:\/\//, '').replace(/:/g, '-')}_${dataFormatada}_matrix_hits.txt`;

      const blob = new Blob([hits], { type: 'text/plain' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = nomeArquivo;
      link.click();
    }
